<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu thuốc DAV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;}
.hdr{background:#fff;border-bottom:1px solid #e5e5e0;padding:14px 16px;position:sticky;top:0;z-index:10;}
.hdr h1{font-size:17px;font-weight:600;}
.hdr p{font-size:11px;color:#999;margin-top:2px;}
.main{padding:14px 16px;max-width:1100px;margin:0 auto;}
.row{display:flex;gap:8px;margin-bottom:10px;}
input{flex:1;padding:11px 13px;border:1px solid #ddd;border-radius:10px;font-size:16px;outline:none;background:#fff;}
input:focus{border-color:#555;}
button{padding:11px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;}
button:disabled{background:#999;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{padding:5px 12px;background:#fff;border:1px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;color:#555;}
.chip:active{background:#f0f0f0;}
.sumcard{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:12px;border:1px solid #e8e8e8;}
.sumcard b{font-size:16px;}
.spin-wrap{display:flex;align-items:center;gap:10px;padding:24px 0;color:#888;font-size:14px;}
.spin{width:18px;height:18px;border:2px solid #ddd;border-top-color:#333;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e8e8e8;background:#fff;}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
th{padding:9px 12px;text-align:left;background:#f9f9f7;color:#666;font-weight:500;font-size:11px;border-bottom:1px solid #eee;}
td{padding:8px 12px;border-bottom:1px solid #f5f5f0;vertical-align:top;color:#1a1a1a;overflow-wrap:break-word;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.col-stt{width:36px;}
.col-gplh{width:130px;}
.col-ten{width:160px;}
.col-hoat{width:auto;}
.col-hl{width:80px;font-weight:600;}
.col-dbc{width:130px;}
.err{padding:14px;background:#fff5f5;border-radius:10px;color:#c0392b;font-size:13px;border:1px solid #fcc;}
.note{font-size:11px;color:#aaa;margin-top:12px;line-height:1.6;}
</style>
</head>
<body>
<div class="hdr">
  <h1>💊 Tra cứu thuốc DAV</h1>
  <p>Dữ liệu thực từ Cục Quản lý Dược Việt Nam</p>
</div>
<div class="main">
  <div class="row">
    <input type="text" id="inp" placeholder="Nhập tên hoạt chất..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="btn" onclick="doSearch()">Tìm</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="fill('atorvastatin')">atorvastatin</span>
    <span class="chip" onclick="fill('amoxicillin')">amoxicillin</span>
    <span class="chip" onclick="fill('metformin')">metformin</span>
    <span class="chip" onclick="fill('losartan')">losartan</span>
    <span class="chip" onclick="fill('omeprazole')">omeprazole</span>
    <span class="chip" onclick="fill('paracetamol')">paracetamol</span>
    <span class="chip" onclick="fill('amlodipine')">amlodipine</span>
    <span class="chip" onclick="fill('ciprofloxacin')">ciprofloxacin</span>
  </div>
  <div id="res"></div>
  <p class="note">Nguồn: dichvucong.dav.gov.vn · Dữ liệu SĐK gốc theo quyết định cấp, chưa bao gồm đính chính/thu hồi.</p>
</div>
<script>
const mauDBC={};
const mauList=['#c0392b','#27ae60','#2980b9','#8e44ad','#e67e22','#16a085','#d35400','#2c3e50'];
let mauIdx=0;
function layMau(dbc){
  if(!mauDBC[dbc]){mauDBC[dbc]=mauList[mauIdx%mauList.length];mauIdx++;}
  return mauDBC[dbc];
}
function fill(v){document.getElementById('inp').value=v;doSearch();}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

async function doSearch(){
  const kw=document.getElementById('inp').value.trim();
  if(!kw)return;
  const res=document.getElementById('res');
  res.innerHTML='<div class="spin-wrap"><div class="spin"></div><span>Đang tải...</span></div>';
  document.getElementById('btn').disabled=true;
  try{
    const r=await fetch('/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:kw})});
    const d=await r.json();
    if(d.error){res.innerHTML=`<div class="err">${d.error}</div>`;}
    else render(d);
  }catch(e){res.innerHTML=`<div class="err">Lỗi: ${e.message}</div>`;}
  document.getElementById('btn').disabled=false;
}

function render(d){
  const res=document.getElementById('res');
  if(!d.rows||d.rows.length===0){
    res.innerHTML='<div class="err">Không tìm thấy kết quả.</div>';
    return;
  }
  let html=`<div class="sumcard">Tìm thấy <b>${d.total}</b> số đăng ký lưu hành tại Việt Nam (hiển thị ${d.rows.length})</div>
  <div class="tbl-wrap"><table>
    <colgroup>
      <col class="col-stt"><col class="col-gplh"><col class="col-ten">
      <col class="col-hoat"><col class="col-hl"><col class="col-dbc">
    </colgroup>
    <tr>
      <th>#</th>
      <th>Số GPLH</th>
      <th>Tên thuốc</th>
      <th>Hoạt chất</th>
      <th>Hàm lượng</th>
      <th>Dạng bào chế</th>
    </tr>`;
  d.rows.forEach((r,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td style="font-family:monospace;font-size:12px;color:#555">${r.soGPLH||'—'}</td>
      <td>${r.tenThuoc||'—'}</td>
      <td>${r.hoatChat||'—'}</td>
      <td class="col-hl">${r.hamLuongNgan||'—'}</td>
      <td style="color:${layMau(r.dangBaoChe)};font-weight:500">${r.dangBaoChe||'—'}</td>
    </tr>`;
  });
  html+='</table></div>';
  res.innerHTML=html;
}
</script>
</body>
</html>
