<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tra cứu thuốc DAV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a;}
.hdr{background:#fff;border-bottom:1px solid #e5e5e0;padding:14px 16px;position:sticky;top:0;z-index:10;}
.hdr h1{font-size:17px;font-weight:600;}
.hdr p{font-size:11px;color:#999;margin-top:2px;}
.main{padding:14px 16px;max-width:680px;margin:0 auto;}
.row{display:flex;gap:8px;margin-bottom:10px;}
input{flex:1;padding:11px 13px;border:1px solid #ddd;border-radius:10px;font-size:16px;outline:none;background:#fff;-webkit-appearance:none;}
input:focus{border-color:#555;}
button{padding:11px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:500;}
button:disabled{background:#999;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{padding:5px 12px;background:#fff;border:1px solid #ddd;border-radius:20px;font-size:13px;cursor:pointer;color:#555;}
.chip:active{background:#f0f0f0;}
.spin-wrap{display:flex;align-items:center;gap:10px;padding:24px 0;color:#888;font-size:14px;}
.spin{width:18px;height:18px;border:2px solid #ddd;border-top-color:#333;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg);}}
.sumcard{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;border:1px solid #e8e8e8;}
.sumcard .lbl{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;}
.sumcard .nm{font-size:20px;font-weight:600;margin:4px 0 2px;}
.sumcard .cnt{font-size:13px;color:#666;}
.grp{background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid #e8e8e8;overflow:hidden;}
.ghdr{padding:11px 14px;background:#f9f9f7;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;}
.ghdr .dbc{font-size:14px;font-weight:600;}
.bdg{font-size:11px;padding:3px 9px;border-radius:12px;background:#e8f0fe;color:#1a56db;font-weight:500;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:6px 14px;text-align:left;color:#999;font-weight:500;font-size:11px;background:#fafaf8;}
td{padding:8px 14px;border-top:1px solid #f0f0ee;vertical-align:top;}
td.hl{font-weight:600;}
.mono{font-family:monospace;font-size:11px;background:#f5f5f0;padding:1px 5px;border-radius:3px;display:inline-block;margin:1px;}
.err{padding:14px;background:#fff5f5;border-radius:10px;color:#c0392b;font-size:13px;border:1px solid #fcc;line-height:1.6;}
.note{font-size:11px;color:#aaa;margin-top:14px;padding-top:12px;border-top:1px solid #eee;line-height:1.6;}
</style>
</head>
<body>
<div class="hdr">
  <h1>💊 Tra cứu thuốc DAV</h1>
  <p>Dữ liệu thực từ Cục Quản lý Dược Việt Nam</p>
</div>
<div class="main">
  <div class="row">
    <input type="text" id="inp" placeholder="Nhập tên hoạt chất..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="btn" onclick="doSearch()">Tìm</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="fill('amoxicillin')">amoxicillin</span>
    <span class="chip" onclick="fill('metformin')">metformin</span>
    <span class="chip" onclick="fill('atorvastatin')">atorvastatin</span>
    <span class="chip" onclick="fill('losartan')">losartan</span>
    <span class="chip" onclick="fill('omeprazole')">omeprazole</span>
    <span class="chip" onclick="fill('paracetamol')">paracetamol</span>
    <span class="chip" onclick="fill('amlodipine')">amlodipine</span>
    <span class="chip" onclick="fill('ciprofloxacin')">ciprofloxacin</span>
  </div>
  <div id="res"></div>
  <p class="note">Nguồn: dichvucong.dav.gov.vn · Dữ liệu SĐK gốc theo quyết định cấp, chưa bao gồm đính chính/thu hồi.</p>
</div>
<script>
function fill(v){document.getElementById('inp').value=v;doSearch();}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
async function doSearch(){
  const kw=document.getElementById('inp').value.trim();
  if(!kw)return;
  const res=document.getElementById('res');
  res.innerHTML='<div class="spin-wrap"><div class="spin"></div><span>Đang tải...</span></div>';
  document.getElementById('btn').disabled=true;
  try{
    const r=await fetch('/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keyword:kw})});
    const d=await r.json();
    if(d.error){res.innerHTML=`<div class="err">${d.error}</div>`;}
    else if(!d.nhom||d.nhom.length===0){res.innerHTML=`<div class="err">Không tìm thấy kết quả cho "<strong>${kw}</strong>"</div>`;}
    else render(d);
  }catch(e){res.innerHTML=`<div class="err">Lỗi: ${e.message}</div>`;}
  document.getElementById('btn').disabled=false;
}
function render(d){
  const res=document.getElementById('res');
  let html=`<div class="sumcard"><div class="lbl">Hoạt chất</div><div class="nm">${d.hoatChat}</div><div class="cnt">Tổng <strong>${d.tongSoDangKy}</strong> số đăng ký tại Việt Nam</div></div>`;
  d.nhom.forEach(nhom=>{
    const tot=nhom.hamLuongs.reduce((s,h)=>s+h.soSDK,0);
    html+=`<div class="grp"><div class="ghdr"><span class="dbc">${nhom.daBaoChe}</span><span class="bdg">${tot} SĐK</span></div><table><tr><th>Hàm lượng</th><th>Số SĐK</th><th>Ví dụ SĐK</th></tr>`;
    nhom.hamLuongs.forEach(hl=>{
      const ex=(hl.sdk||[]).slice(0,3).map(s=>`<span class="mono">${s}</span>`).join('');
      html+=`<tr><td class="hl">${hl.hamLuong}</td><td>${hl.soSDK}</td><td>${ex||'—'}</td></tr>`;
    });
    html+=`</table></div>`;
  });
  res.innerHTML=html;
}
</script>
</body>
</html>
